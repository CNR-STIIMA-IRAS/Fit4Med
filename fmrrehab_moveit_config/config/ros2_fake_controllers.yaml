controller_manager:
  ros__parameters:
    update_rate: 500 # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
    - joint_z
    - joint_y
    - joint_x

    command_interfaces:
    - position
    - velocity

    state_interfaces:
    - position
    - velocity
