name: ros2

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    name: Build on ros ${{ matrix.ros_distro }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        include:
        - os: ubuntu-24.04
          ros_distro: 'jazzy'

    steps:   
    - name: Setup ROS
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-missing git python3-pip sudo
        sudo apt-get -y install ros-${{ matrix.ros_distro }}-ros-base
        python3 -m pip install colcon-common-extensions
        python3 -m pip install --force-reinstall pytest-repeat
        python3 -m pip install vcstool
        python3 -m pip install rosdep
        rosdep update
    - name: Setup Colcon Workspace
      run: | 
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        mkdir -p ${{github.workspace}}/colcon_ws/src
        cd ${{github.workspace}}/colcon_ws/src
        cd ..

    - name: Checkout Fit4Med repository
      uses: actions/checkout@v2
      with:
        repository: 'CNR-STIIMA-IRAS/Fit4Med'
        path: 'colcon_ws/src/Fit4Med'

    - name: Install Dependencies with rosdep
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd ${{github.workspace}}/colcon_ws
        rosdep install --from-paths src --ignore-src -r -y

    - name: colcon build
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd ${{github.workspace}}/colcon_ws
        colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}