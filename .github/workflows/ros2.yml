name: ros2

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  BUILD_TYPE: Release

## Try to use Docker --- 
jobs:
  build:
    name: Build on ros ${{ matrix.ros_distro }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        include:
        - os: ubuntu-24.04
          ros_distro: 'jazzy'
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base

    steps:   
    - name: Create workspace
      run: mkdir -p src/Fit4Med

    - name: Checkout code
      uses: actions/checkout@v3
      with:
        path: src/Fit4Med

    - name: Setup ROS environment
      run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          rosdep update
      shell: bash
    - name: Checkout Fit4Med dependencies (VCS)
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        vcs import src < src/Fit4Med/.repos
      shell: bash

    - name: Install Dependencies with rosdep
      run: |
        apt-get update
        apt-get install -y curl gnupg2 lsb-release
        curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
          -o /usr/share/keyrings/ros-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
          http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" \
          > /etc/apt/sources.list.d/ros2.list
        apt-get update
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        rosdep install --from-paths src --ignore-src -r -y
      shell: bash

    - name: colcon build
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        colcon build --executor sequential --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
      shell: bash

    - name: colcon test 'plc_controller'
      run: |
        colcon test --packages-select plc_controller --event-handlers console_direct+ --ctest-args --rerun-failed --output-on-failure
      shell: bash