name: ros2

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build on ros ${{ matrix.ros_distro }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        include:
        - os: ubuntu-24.04
          ros_distro: 'jazzy'

    steps:   
    - name: Setup ROS
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ matrix.ros_distro }}

    - name: Setup Colcon Workspace
      run: | 
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        mkdir -p ${{github.workspace}}/colcon_ws/src
        cd ${{github.workspace}}/colcon_ws/src
        cd ..

    - name: Checkout Fit4Med repository
      uses: actions/checkout@v2
      with:
        repository: 'CNR-STIIMA-IRAS/Fit4Med'
        path: 'colcon_ws/src/Fit4Med'

    - name: Checkout Fit4Med dependencies (VCS)
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd ${{github.workspace}}/colcon_ws
        vcs import src < src/Fit4Med/.repos

    - name: Install Dependencies with rosdep
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        rosdep update
        cd ${{github.workspace}}/colcon_ws
        rosdep install --from-paths src --ignore-src -r -y

    - name: colcon build
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd ${{github.workspace}}/colcon_ws
        colcon build --executor sequential --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: colcon test 'plc_controller'
      run: |
        source /opt/ros/${{ matrix.ros_distro }}/setup.bash
        cd ${{github.workspace}}/colcon_ws
        colcon test --packages-select plc_controller --event-handlers console_direct+ --ctest-args --rerun-failed --output-on-failure